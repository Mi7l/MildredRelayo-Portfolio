kind = "web"
previewPath = "/"
title = "LIM.VISUALS"
version = "1.0.0"
id = "artifacts/lim-visuals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23197

[services.development]
run = "pnpm --filter @workspace/lim-visuals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lim-visuals", "run", "build" ]
publicDir = "artifacts/lim-visuals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23197"
BASE_PATH = "/"
